<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiProfesional — Profesionales verificados en Argentina</title>
  <meta name="description" content="MiProfesional conecta clientes con profesionales verificados en toda Argentina." />
  <meta property="og:title" content="MiProfesional — Profesionales verificados" />
  <meta property="og:description" content="Conecta con profesionales verificados cerca tuyo." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.miprofesional.online" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      color: #e2e8f0;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #0f7a5a;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 32px rgba(15, 122, 90, 0.3);
    }
    .logo span {
      color: #fff;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      color: #fff;
    }
    h1 span {
      background: linear-gradient(135deg, #34d399, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 2rem;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      background: #0f7a5a;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(15, 122, 90, 0.35);
    }
    .play-btn:hover {
      background: #0d6b4f;
      transform: translateY(-1px);
      box-shadow: 0 6px 32px rgba(15, 122, 90, 0.45);
    }
    .play-btn:active {
      transform: translateY(0);
    }
    .play-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    .footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #475569;
    }
    .footer a {
      color: #64748b;
      text-decoration: none;
    }
    .footer a:hover { color: #94a3b8; }
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .play-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>MP</span></div>
    <div class="badge">App oficial</div>
    <h1>El profesional que necesitás<br /><span>está más cerca</span></h1>
    <p>
      MiProfesional conecta clientes con profesionales verificados en toda Argentina.
      Plomeros, electricistas, médicos, abogados y más.
    </p>
    <a href="https://www.miprofesional.online" target="_blank" rel="noopener noreferrer" class="play-btn">
      Ir a MiProfesional.online
    </a>
    <div class="footer">
      <a href="https://www.miprofesional.online">www.miprofesional.online</a>
    </div>
  </div>
</body>
</html>
