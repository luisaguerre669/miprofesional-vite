services:
  - type: web
    name: miprofesional-backend
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: 15000
      - key: MONGO_CONNECT_TIMEOUT_MS
        value: 15000
