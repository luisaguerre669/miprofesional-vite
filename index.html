<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>MiProfesional</title><style>* {  margin: 0;  padding: 0;  box-sizing: border-box;  font-family: Arial, sans-serif;}body {  background: #0a0a0a;  color: white;  display: flex;}/* MENU LATERAL */.sidebar {  width: 220px;  height: 100vh;  background: #111;  padding: 20px;  position: fixed;}.sidebar h1 {  color: #00ffcc;  font-size: 20px;  margin-bottom: 30px;}.menu button {  width: 100%;  margin: 10px 0;  padding: 10px;  background: #1a1a1a;  border: none;  color: white;  cursor: pointer;  transition: 0.3s;}.menu button:hover {  background: #00ffcc;  color: black;}/* CONTENIDO */.content {  margin-left: 240px;  padding: 20px;  width: 100%;}/* BANNERS PROFESIONES */.grid {  display: grid;  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));  gap: 15px;  margin-top: 20px;}.card {  background: #1a1a1a;  padding: 20px;  border-radius: 10px;  text-align: center;  cursor: pointer;  transition: 0.3s;}.card:hover {  background: #00ffcc;  color: black;  transform: scale(1.05);}/* LOGIN */.login-box {  max-width: 300px;  margin-top: 20px;  display: none;}input {  width: 100%;  padding: 10px;  margin: 8px 0;  border: none;  outline: none;}.login-btn {  width: 100%;  padding: 10px;  background: #00ffcc;  border: none;  cursor: pointer;}.section {  display: none;}.active {  display: block;}</style></head><body><!-- SIDEBAR --><div class="sidebar">  <h1>MiProfesional</h1>  <div class="menu">    <button onclick="showSection('home')">Inicio</button>    <button onclick="showSection('categorias')">Categorías</button>    <button onclick="showSection('login')">Login</button>  </div></div><!-- CONTENIDO --><div class="content">  <!-- INICIO -->  <div id="home" class="section active">    <h2>Bienvenido a MiProfesional</h2>    <p>Encontrá profesionales de cualquier área en un solo lugar.</p>  </div>  <!-- CATEGORÍAS -->  <div id="categorias" class="section">    <h2>Categorías</h2>    <div class="grid">      <div class="card">🔧 Mecánicos</div>      <div class="card">💡 Electricistas</div>      <div class="card">🏗️ Constructores</div>      <div class="card">💻 Programadores</div>      <div class="card">🎨 Diseñadores</div>      <div class="card">🧑‍⚕️ Salud</div>      <div class="card">📚 Profesores</div>      <div class="card">🚚 Transporte</div>    </div>  </div>  <!-- LOGIN -->  <div id="login" class="section">    <h2>Login</h2>    <div class="login-box" style="display:block;">      <input type="text" id="user" placeholder="Usuario"/>      <input type="password" id="pass" placeholder="Contraseña"/>      <button class="login-btn" onclick="login()">Entrar</button>      <p id="msg"></p>    </div>  </div></div><script>function showSection(id) {  document.querySelectorAll('.section').forEach(sec => {    sec.classList.remove('active');  });  document.getElementById(id).classList.add('active');}function login() {  let user = document.getElementById("user").value;  let pass = document.getElementById("pass").value;  if(user === "admin" && pass === "1234") {    document.getElementById("msg").innerHTML = "✔ Login correcto";  } else {    document.getElementById("msg").innerHTML = "❌ Datos incorrectos";  }}</script></body></html>
